<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tirana Deal Finder{% endblock %}</title>

  <!-- Display: Fraunces (used sparingly) · UI/data: Schibsted Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Schibsted+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap: layout plumbing only; the identity lives in style.css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="wrap site-header__inner">
      <a class="brand" href="{{ url_for('home') }}">
        <span class="brand__mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 11.4 12 4l8 7.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6.2 10.4V20h11.6v-9.6" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="brand__name">Tirana<span class="brand__accent"> Deals</span></span>
      </a>
      <nav class="site-nav">
        <a class="site-nav__link" href="{{ url_for('home') }}">Listings</a>
        <a class="site-nav__link" href="{{ url_for('analytics') }}">Market</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Floating chat assistant (present on every page) -->
  <div class="chat-widget" id="chatWidget">
    <div class="chat-panel" id="chatPanel" role="dialog" aria-label="Tirana Deals assistant" aria-hidden="true">
      <div class="chat-panel__header">
        <span class="chat-panel__title"><span class="chat-panel__dot"></span>Ask about Tirana deals</span>
        <button class="chat-panel__close" id="chatClose" type="button" aria-label="Close chat">&times;</button>
      </div>
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-suggest" id="chatSuggest">
        <button class="chat-chip" type="button">Best deals under &euro;150k</button>
        <button class="chat-chip" type="button">Market overview</button>
        <button class="chat-chip" type="button">Price a 90m&sup2; 2-bed</button>
      </div>
      <form class="chat-input" id="chatForm">
        <textarea id="chatText" rows="1" placeholder="Ask about listings, prices, deals…" autocomplete="off"></textarea>
        <button class="chat-send" id="chatSend" type="submit" aria-label="Send">&uarr;</button>
      </form>
    </div>
    <button class="chat-launcher" id="chatLauncher" type="button" aria-label="Open chat assistant">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 5.5h16v10H9l-5 4v-4H4z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>

  <footer class="site-footer">
    <div class="wrap site-footer__inner">
      <span class="brand brand--footer">
        <span class="brand__name">Tirana<span class="brand__accent"> Deals</span></span>
      </span>
      <span class="site-footer__note">Prices are model estimates from a teaching project — not valuations.</span>
    </div>
  </footer>

  <script>
    // Reveal a hairline + faint shadow on the header once the page scrolls.
    (function () {
      var header = document.getElementById('siteHeader');
      var onScroll = function () {
        header.classList.toggle('is-stuck', window.scrollY > 8);
      };
      onScroll();
      window.addEventListener('scroll', onScroll, { passive: true });
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
